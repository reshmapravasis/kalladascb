<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="East Kallada (South) Co-op Bank Ltd No Q 187 | Gallery"
        data-ml="ഈസ്റ്റ് കല്ലട (സൗത്ത് ) സർവീസ് സഹകരണ ബാങ്ക് ലിമിറ്റഡ് ക്യൂ 187">East Kallada (South) Co-op Bank Ltd No
        Q
        187 | Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Serif+Malayalam:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header id="global-header" class="main-header"></header>
    <main>
        <section class="inner-hero reveal">
            <div class="inner-hero-content">
                <h1 data-en="Moments &amp; Events" data-ml="നിമിഷങ്ങളും സംഭവങ്ങളും">Moments &amp; Events</h1>
                <div class="divider center"></div>
                <p data-en="Visual documentation of community initiatives, bank functions, and cultural gatherings."
                    data-ml="കമ്മ്യൂണിറ്റി സംരംഭങ്ങൾ, ബാങ്ക് പ്രവർത്തനങ്ങൾ എന്നിവയുടെ ദൃശ്യരേഖകൾ.">Visual documentation
                    of community initiatives, bank functions, and cultural gatherings.</p>
            </div>
        </section>

        <!-- Visual Presentation Matrix -->
        <section class="gallery-showcase reveal">
            <div class="interactive-gallery-grid">

                <!-- Image Item 1 -->
                <div class="gallery-item-card">
                    <div class="gallery-image-wrapper">
                        <img src="https://images.unsplash.com/photo-1593113598332-cd288d649433?auto=format&fit=crop&w=600&q=80"
                            alt="Bank Event">
                        <div class="gallery-item-overlay">
                            <div class="overlay-inner-info">
                                <span class="tag">Society Events</span>
                                <h4 data-en="Annual General Body Meeting" data-ml="വാർഷിക പൊതുയോഗം">Annual General Body
                                    Meeting</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Image Item 2 -->
                <div class="gallery-item-card">
                    <div class="gallery-image-wrapper">
                        <img src="https://images.unsplash.com/photo-1590650213165-c1fef80648c4?auto=format&fit=crop&w=600&q=80"
                            alt="Distribution Event">
                        <div class="gallery-item-overlay">
                            <div class="overlay-inner-info">
                                <span class="tag">Welfare</span>
                                <h4 data-en="Agricultural Subsidy Distribution" data-ml="കാർഷിക സബ്സിഡി വിതരണം">
                                    Agricultural Subsidy Distribution</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Image Item 3 -->
                <div class="gallery-item-card">
                    <div class="gallery-image-wrapper">
                        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80"
                            alt="Public Services">
                        <div class="gallery-item-overlay">
                            <div class="overlay-inner-info">
                                <span class="tag">Services</span>
                                <h4 data-en="PDS Centre Operations" data-ml="റേഷൻ കട പ്രവർത്തനങ്ങൾ">PDS Centre
                                    Operations</h4>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer id="global-footer" class="main-footer"></footer>
    <script src="script.js"></script>
</body>

</html>
