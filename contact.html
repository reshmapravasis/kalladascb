<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-en="East Kallada (South) Co-op Bank Ltd No Q 187 | Contact"
    data-ml="ഈസ്റ്റ് കല്ലട (സൗത്ത് ) സർവീസ് സഹകരണ ബാങ്ക് ലിമിറ്റഡ് ക്യൂ 187">East Kallada (South) Co-op Bank Ltd No Q
    187 | Contact</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Serif+Malayalam:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header id="global-header" class="main-header"></header>
  <main>
    <section class="inner-hero reveal">
      <div class="inner-hero-content">
        <h1 data-en="Connect With Us" data-ml="ഞങ്ങളുമായി ബന്ധപ്പെടുക">Connect With Us</h1>
        <div class="divider center"></div>
        <p data-en="Have questions or need financial consultation? Reach out to our customer service desk directly."
          data-ml="ചോദ്യങ്ങളുണ്ടോ അതോ സാമ്പത്തിക ഉപദേശം ആവശ്യമുണ്ടോ? ഞങ്ങളുമായി നേരിട്ട് ബന്ധപ്പെടുക.">Have questions or
          need financial consultation? Reach out to our customer service desk directly.</p>
      </div>
    </section>

    <!-- Split Action Hub: Form vs Core Contact Details -->
    <section class="contact-hub-wrapper reveal">
      <div class="contact-split-grid">

        <!-- Interactive Information Cards Grid -->
        <div class="contact-info-deck">
          <div class="info-icon-strip-card">
            <div class="strip-icon"><i class="fa-solid fa-location-dot"></i></div>
            <div class="strip-details">
              <h4 data-en="Headquarters Location" data-ml="ആസ്ഥാനം">Headquarters Location</h4>
              <p data-en="Chittumala, East Kallada P.O, Kollam - 691502"
                data-ml="ചിറ്റുമല, ഈസ്റ്റ് കല്ലട പി.ഒ, കൊല്ലം - 691502">Chittumala, East Kallada P.O, Kollam - 691502
              </p>
            </div>
          </div>

          <div class="info-icon-strip-card">
            <div class="strip-icon"><i class="fa-solid fa-phone"></i></div>
            <div class="strip-details">
              <h4 data-en="Direct Support Phone" data-ml="ഫോൺ നമ്പർ">Direct Support Phone</h4>
              <p><a href="tel:+917558888743">+91 75588 88743</a></p>
            </div>
          </div>

          <div class="info-icon-strip-card">
            <div class="strip-icon"><i class="fa-solid fa-envelope"></i></div>
            <div class="strip-details">
              <h4 data-en="Electronic Mail Inbox" data-ml="ഇമെയിൽ വിലാസം">Electronic Mail Inbox</h4>
              <p><a href="mailto:ekscbq@gmail.com">ekscbq@gmail.com</a></p>
            </div>
          </div>
        </div>

        <!-- Modern Message Creation Form Panel -->
        <div class="contact-form-panel">
          <form id="secure-communication-form" autocomplete="off">
            <div class="form-input-group">
              <label for="frm-name" data-en="Your Full Name" data-ml="നിങ്ങളുടെ പേര്">Your Full Name</label>
              <input type="text" id="frm-name" required placeholder="John Doe">
            </div>
            <div class="form-input-group">
              <label for="frm-email" data-en="Email Address" data-ml="ഇമെയിൽ വിലാസം">Email Address</label>
              <input type="email" id="frm-email" required placeholder="name@example.com">
            </div>
            <div class="form-input-group">
              <label for="frm-message" data-en="Message Details" data-ml="സന്ദേശം">Message Details</label>
              <textarea id="frm-message" rows="5" required placeholder="Type your inquiry here..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
              <span data-en="Send Secure Message" data-ml="സന്ദേശം അയക്കുക">Send Secure Message</span>
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </form>
        </div>

      </div>
    </section>
  </main>

  <footer id="global-footer" class="main-footer"></footer>
  <script src="script.js"></script>
</body>

</html>
